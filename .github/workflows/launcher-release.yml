# Push-to-update pipeline, build side. Releases fire ONLY from a version tag
# pushed to main (Will: main always reflects at least the latest release;
# shipping is one deliberate act). To ship, from a green main:
#   git tag launcher-v1.0.N && git push origin launcher-v1.0.N
# — see docs/RELEASING.md. The tag builds the whole client (each live Origin
# Client mod jar via Gradle, then the WPF launcher with those jars bundled in)
# and publishes a GitHub release under the same tag. Running launchers poll
# the release feed (Core/Updates/UpdateService.cs), light the corner download
# badge, and self-update from the OriginLauncher-win-x64.zip asset. Updates
# are mandatory: a launcher older than the latest release refuses to launch
# the game until updated.
#
# COMPATIBILITY: installed launchers key on the launcher-v tag prefix and the
# exact asset names (OriginLauncher-win-x64.zip / OriginLauncher-Setup.exe).
# Never change those. New tags must be strictly greater than the last release.
#
# NOTE: the launcher polls this feed UNAUTHENTICATED, which requires the
# repository (or at least its releases) to be public.
name: launcher-release

on:
  push:
    tags: ["launcher-v*"]

permissions:
  contents: write

concurrency:
  group: launcher-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The in-game mod, built first so the launcher build below finds
      # build/libs/originclient-0.1.0.jar and bundles it (the csproj Content
      # item is conditional on it existing — a fresh runner always builds it
      # here, so releases always ship the mod).
      - name: Build Origin Client mod
        working-directory: src/mods/versions/1.21.1
        run: .\gradlew.bat build --no-daemon

      # The 1.20 API-family mod (src/mods/versions/1.20, covers 1.20 + 1.20.1),
      # so the launcher below bundles build/libs/originclient-1.20-0.4.1.jar as
      # Bundled/OriginClient/originclient-1.20.jar (csproj Content, conditional on
      # it existing). Same JDK 21 runner: the module targets Java 17 bytecode via
      # `options.release = 17`, which javac 21 emits fine. libs/ (dev-only Iris/
      # Sodium for runClient) is absent on the runner and build.gradle guards
      # those file deps behind .exists(), so `build` runs without them.
      - name: Build Origin Client mod (1.20)
        working-directory: src/mods/versions/1.20
        run: .\gradlew.bat build --no-daemon

      # The 1.20.4 API-family mod (src/mods/versions/1.20.4), bundled as
      # Bundled/OriginClient/originclient-1.20.4.jar. Same Java 17-via-JDK-21
      # and absent-libs/ notes as the 1.20 module above.
      - name: Build Origin Client mod (1.20.4)
        working-directory: src/mods/versions/1.20.4
        run: .\gradlew.bat build --no-daemon

      # The 1.21 base release (src/mods/versions/1.21), bundled as
      # Bundled/OriginClient/originclient-1.21.jar. Same source as 1.21.1, its
      # own 1.21-mapped build; real version so the runner resolves + ships it.
      - name: Build Origin Client mod (1.21)
        working-directory: src/mods/versions/1.21
        run: .\gradlew.bat build --no-daemon

      # NOTE (1.21.11): src/mods/staged/1.21.11 is a complete Tier-A port of the
      # 1.21.1 build (only the 1.21.2 blit rework differs). It is NOT built/shipped
      # here yet — Loom can't resolve the 1.21.11 game version on the runner until
      # it's available, and shipping unverified would violate the runClient bar in
      # CLAUDE.md. The OriginBuilds line and csproj bundle are staged to match.
      # Re-add this step (and uncomment those) once the version resolves and the
      # port is runClient-verified — see src/mods/staged/1.21.11/PORT-12111.md:
      #   - name: Build Origin Client mod (1.21.11)
      #     working-directory: src/mods/staged/1.21.11  # move to versions/ when flipping live
      #     run: .\gradlew.bat build --no-daemon

      # NOTE (26.2): src/mods/staged/26.2 is scaffolded with a proven Java 25 /
      # unobfuscated-Loom toolchain, but its render layer is mid-port to 26.2's
      # retained-mode GUI and does not compile yet, so it is intentionally NOT
      # built or shipped here. Re-add this step (JAVA_HOME ${{ env.JAVA_HOME_25_X64 }},
      # 25 added to setup-java) once the port compiles clean — see MEMORY.md
      # 2026-07-11 and the OriginBuilds/csproj "26.2" entries (also staged out).

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Version comes from the tag itself (launcher-v1.0.21 -> 1.0.21) so the
      # release a player sees is exactly the version Will typed — no run#.
      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".Substring("launcher-v".Length)
          echo "version=$v" >> $env:GITHUB_OUTPUT

      # Single-file, self-contained: the update zip swaps cleanly as one exe
      # (plus a couple of native satellites) with no .NET install required
      # on the player's machine. -p:Version stamps the assembly version the
      # updater compares against the release tag.
      - name: Publish launcher
        run: >
          dotnet publish src/OriginLauncher.App/OriginLauncher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      # Guard against the csproj's silent Exists() conditions: if a bundling
      # path is ever wrong (e.g. after a module moves), the publish still goes
      # green but ships WITHOUT mod jars and every instance falls back to the
      # standalone catalog. Fail the release instead. Keep this list in sync
      # with the live entries in VersionManager.OriginBuilds.
      - name: Assert bundled mod jars present
        shell: pwsh
        run: |
          $expected = @(
            "originclient-1.21.1.jar",
            "originclient-1.20.jar",
            "originclient-1.20.4.jar",
            "originclient-1.21.jar"
          )
          $dir = "publish\Bundled\OriginClient"
          $missing = $expected | Where-Object { -not (Test-Path (Join-Path $dir $_)) }
          if ($missing) {
            Write-Error "Missing bundled jars: $($missing -join ', ') — check the csproj Content paths."
            exit 1
          }
          Write-Host "All expected bundled jars present."

      # Fresh-install path: a per-user setup.exe (install/uninstall via
      # Add/Remove Programs). The zip below stays the SELF-UPDATE path — an
      # already-installed launcher swaps its own exe from it, so no reinstall
      # is ever needed on a new release. Both ship on every release.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\OriginLauncher.iss

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath OriginLauncher-win-x64.zip

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: >
          gh release create "${{ github.ref_name }}"
          OriginLauncher-win-x64.zip
          installer\Output\OriginLauncher-Setup.exe
          --title "Origin Launcher ${{ steps.ver.outputs.version }}"
          --notes "Automated build of ${{ github.sha }}"

# Push-to-update pipeline, build side. Releases fire ONLY from the release
# branch (Will: main is for building/testing; shipping is a deliberate act).
# To ship: merge main into release and push — see release/RELEASING.md.
# Every push to release builds the whole client (Origin Client mod jar via
# Gradle, then the WPF launcher with that jar bundled in) and publishes a
# GitHub release tagged launcher-v1.0.<run>. Running launchers poll the
# release feed (Core/Updates/UpdateService.cs), light the corner download
# badge, and self-update from the OriginLauncher-win-x64.zip asset. Updates
# are mandatory: a launcher older than the latest release refuses to launch
# the game until updated.
#
# NOTE: the launcher polls this feed UNAUTHENTICATED, which requires the
# repository (or at least its releases) to be public.
name: launcher-release

on:
  push:
    branches: [release]

permissions:
  contents: write

concurrency:
  group: launcher-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The in-game mod, built first so the launcher build below finds
      # build/libs/originclient-0.1.0.jar and bundles it (the csproj Content
      # item is conditional on it existing — a fresh runner always builds it
      # here, so releases always ship the mod).
      - name: Build Origin Client mod
        working-directory: src/OriginClient.Mod
        run: .\gradlew.bat build --no-daemon

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compute version
        id: ver
        shell: pwsh
        run: echo "version=1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      # Single-file, self-contained: the update zip swaps cleanly as one exe
      # (plus a couple of native satellites) with no .NET install required
      # on the player's machine. -p:Version stamps the assembly version the
      # updater compares against the release tag.
      - name: Publish launcher
        run: >
          dotnet publish src/OriginLauncher.App/OriginLauncher.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      # Fresh-install path: a per-user setup.exe (install/uninstall via
      # Add/Remove Programs). The zip below stays the SELF-UPDATE path — an
      # already-installed launcher swaps its own exe from it, so no reinstall
      # is ever needed on a new release. Both ship on every release.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\OriginLauncher.iss

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath OriginLauncher-win-x64.zip

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: >
          gh release create "launcher-v${{ steps.ver.outputs.version }}"
          OriginLauncher-win-x64.zip
          installer\Output\OriginLauncher-Setup.exe
          --title "Origin Launcher ${{ steps.ver.outputs.version }}"
          --notes "Automated build of ${{ github.sha }}"

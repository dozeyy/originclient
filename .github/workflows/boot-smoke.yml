# Boot-smoke: prove each version doesn't just COMPILE but actually BOOTS with
# zero mixin-apply failures. build-check.yml compiles every module; compiling
# only proves mixin TARGETS exist -- @Inject descriptor / @Shadow mismatches
# surface only when a mixin is APPLIED at class load, i.e. at boot. This runs the
# real client headlessly and greps Minecraft's own log via tools/boot-smoke/smoke.py.
#
# HONEST LIMITATIONS (read before making this a required check):
#  - Headless GL: runners have no GPU, so this uses Xvfb + Mesa's llvmpipe
#    software rasterizer. Sodium hard-requires GL 4.6; llvmpipe caps at 4.5, so
#    MESA_GL_VERSION_OVERRIDE spoofs the version. This is the fragile part -- if a
#    Sodium/Iris version refuses to start under software GL, that's an environment
#    limit, not an Origin bug. Tune per version before trusting a red result.
#  - Coverage is BOOT + MAIN MENU. Mixins that only load on world join (JEI's
#    runtime handlers, the hitbox entity mixin) are NOT exercised here without a
#    seeded world -- keep verifying those with a local runClient (they DO run on
#    Will's machine; see MEMORY.md -> runclient-in-claude-env).
#  - Java 8/16 + legacy Forge modules (1.8.9, 1.12.2, 1.16.5, 1.17.1) need their
#    own game-runtime JDK and are intentionally NOT in the matrix yet.
#
# Starts as manual (workflow_dispatch) so a flaky software-GL result can't block
# merges. Promote to `on: pull_request` once it's proven stable per version.
name: boot-smoke

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: "Per-version hard timeout (seconds)"
        default: "360"

concurrency:
  group: boot-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { version: "1.21.1", java: "21" }
          - { version: "1.21", java: "21" }
          - { version: "1.21.4", java: "21" }
          - { version: "1.21.5", java: "21" }
          - { version: "1.21.6", java: "21" }
          - { version: "1.21.8", java: "21" }
          - { version: "1.21.10", java: "21" }
          - { version: "1.21.11", java: "21" }
          - { version: "1.20", java: "17" }
          - { version: "1.20.2", java: "17" }
          - { version: "1.20.4", java: "17" }
          - { version: "1.18.2", java: "17" }
          - { version: "1.19.2", java: "17" }
          - { version: "1.19.3", java: "17" }
          - { version: "1.19.4", java: "17" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Headless GL deps (Xvfb + Mesa software rasterizer)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils libglu1-mesa

      - name: Boot-smoke ${{ matrix.version }}
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
          MESA_GL_VERSION_OVERRIDE: "4.6"
          MESA_GLSL_VERSION_OVERRIDE: "460"
        run: |
          xvfb-run -a -s "-screen 0 1280x720x24" \
            python tools/boot-smoke/smoke.py "src/mods/versions/${{ matrix.version }}" \
              --timeout "${{ github.event.inputs.timeout || 360 }}"

# Runs tools/perf-catalog/gen_catalog.py against the live Modrinth API and
# commits the result back to the branch it was dispatched on. Exists because
# the remote dev sandbox is firewalled off from api.modrinth.com (same reason
# build-check.yml exists for compiles): the generator needs real version/URL
# data that can only be fetched from a networked machine, and CI runners are
# the one networked machine every session has.
#
# Modes (pick via inputs):
#  - search: resolve an unknown Modrinth slug (prints candidates to the log,
#    changes nothing). Used e.g. to pin down the "BetterRenderDistances" slug.
#  - extras + apply: splice `Extras:` fragments into PerformanceModCatalog.
#    Data.cs IN PLACE and push the change. The script only ever appends/replaces
#    the Extras fragment on each line — the six hand-pinned core slots are
#    untouched by construction (see EXTRAS_FRAG_RE in the script).
#
# Triggers: workflow_dispatch only registers once this file reaches the
# default branch, so while the work lives on a feature branch the push
# trigger below is the way to run it (push-event workflows execute the file
# as it exists at the pushed commit). Path-filtered to the catalog tooling so
# ordinary mod/launcher pushes don't re-resolve Modrinth every time, and the
# workflow's own result-commit can't loop: pushes made with GITHUB_TOKEN
# never trigger workflows.
name: perf-catalog-extras

on:
  push:
    branches: ["claude/**"]
    paths:
      - ".github/workflows/perf-catalog-extras.yml"
      - "tools/perf-catalog/**"
  workflow_dispatch:
    inputs:
      search:
        description: "Modrinth search query (search mode; leave empty for extras mode)"
        default: ""
      versions:
        description: "MC versions to resolve extras for (extras mode)"
        default: ""
      apply:
        description: "Splice results into Data.cs and push to this branch"
        type: boolean
        default: true

env:
  # Every live standalone (BundlesPerfStack:false) version. 1.21.1 is
  # deliberately absent — it bundles its stack jar-in-jar, its standalone
  # catalog line is never installed. 1.21.9 is pulled, 26.2 staged.
  DEFAULT_VERSIONS: "1.16.5 1.17.1 1.18.2 1.19.2 1.19.3 1.19.4 1.20 1.20.1 1.20.2 1.20.4 1.21 1.21.2 1.21.3 1.21.4 1.21.5 1.21.6 1.21.7 1.21.8 1.21.10 1.21.11"

concurrency:
  group: perf-catalog-extras-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Search Modrinth
        if: github.event_name == 'workflow_dispatch' && inputs.search != ''
        run: python3 tools/perf-catalog/gen_catalog.py --search "${{ inputs.search }}"

      # Prove every EXTRA_PROJECTS slug points at the intended project before
      # pinning anything, and surface candidates for the still-unresolved
      # "BetterRenderDistances" mod from Will's reference screenshot.
      - name: Validate slugs + BRD candidates
        if: github.event_name == 'push' || inputs.search == ''
        run: |
          for slug in sodium-extra moreculling cull-leaves cullleaves immediatelyfast modernfix cloth-config c2me-fabric starlight scalablelux simple-voice-chat clumps noisium world-host shulkerboxtooltip effecttimerplus; do
            printf '== %-18s ' "$slug"
            curl -sf --max-time 30 -A "origin-launcher-catalog-gen/1.0" \
              "https://api.modrinth.com/v2/project/$slug" \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d["slug"], "|", d["title"], "|", d["id"], "| game_versions:", d["game_versions"][:3], "...", d["game_versions"][-3:])' \
              || echo "!! NOT FOUND"
          done
          echo "---- search: better render distance ----"
          python3 tools/perf-catalog/gen_catalog.py --search "better render distance"
          echo "---- search: render distance ----"
          python3 tools/perf-catalog/gen_catalog.py --search "render distance"

      # Pin data for the 1.21.1 jar-in-jar bundle: its Sodium is the BUNDLED
      # 0.6.13, not the standalone row's 0.8.12, so the automatic pin-pairing
      # doesn't apply — a human reads this listing and hand-pins
      # src/mods/versions/1.21.1/gradle.properties instead.
      - name: List 1.21.1 bundle candidates
        if: github.event_name == 'push' || inputs.search == ''
        run: |
          for slug in sodium-extra moreculling cull-leaves better-render-distance cloth-config midnightlib; do
            echo "==== $slug @ 1.21.1"
            python3 tools/perf-catalog/gen_catalog.py --list "$slug" 1.21.1 || true
          done

      - name: Resolve extras (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.search == '' && !inputs.apply
        run: python3 tools/perf-catalog/gen_catalog.py --extras ${{ inputs.versions || env.DEFAULT_VERSIONS }}

      - name: Resolve extras and apply to Data.cs
        if: github.event_name == 'push' || (inputs.search == '' && inputs.apply)
        run: python3 tools/perf-catalog/gen_catalog.py --extras --apply ${{ inputs.versions || env.DEFAULT_VERSIONS }}

      # The opt-in stack (C2ME + Starlight/ScalableLux) — writes the separate
      # Optional: fragment, preserving Extras. Includes 1.21.1 (its opt-in mods
      # are standalone, unlike its bundled core stack).
      - name: Resolve optional (opt-in) and apply to Data.cs
        if: github.event_name == 'push' || (inputs.search == '' && inputs.apply)
        run: python3 tools/perf-catalog/gen_catalog.py --optional --apply ${{ inputs.versions || env.DEFAULT_VERSIONS }} 1.21.1

      # Guard against the one failure mode that matters: any change to a line's
      # existing content outside the appended Extras/Optional fragments. Every
      # changed line must still contain its original core prefix verbatim.
      - name: Audit diff is suffix-only
        if: github.event_name == 'push' || (inputs.search == '' && inputs.apply)
        run: |
          git diff --unified=0 -- src/OriginLauncher.App/Core/Loaders/PerformanceModCatalog.Data.cs | tee /tmp/extras.diff
          python3 - <<'EOF'
          import re, sys
          # Strip BOTH managed fragments to recover the untouched core of a line.
          FRAG = re.compile(r', (?:Extras|Optional): new PerfMod\[\] \{[^{}]*\}')
          removed, added = {}, {}
          for line in open('/tmp/extras.diff'):
              if line.startswith('-') and not line.startswith('---'):
                  m = re.match(r'-\s*\["([^"]+)"\]', line)
                  if m: removed[m.group(1)] = line[1:].rstrip('\n')
              if line.startswith('+') and not line.startswith('+++'):
                  m = re.match(r'\+\s*\["([^"]+)"\]', line)
                  if m: added[m.group(1)] = line[1:].rstrip('\n')
          def core(s):
              c = FRAG.sub('', s)
              return c[:-2] if c.endswith('),') else c
          bad = [mc for mc, old in removed.items()
                 if added.get(mc) is None or core(added[mc]) != core(old)]
          if bad:
              sys.exit(f"NON-SUFFIX change on entries: {bad} — refusing to commit")
          print(f"suffix-only audit OK ({len(removed)} entries changed)")
          EOF

      - name: Commit and push
        if: github.event_name == 'push' || (inputs.search == '' && inputs.apply)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/OriginLauncher.App/Core/Loaders/PerformanceModCatalog.Data.cs
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "perf catalog: extras + opt-in pins (generated via gen_catalog.py on CI)"
            git push
          fi
